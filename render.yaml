services:
  - type: web
    name: shattered-armor
    runtime: node
    plan: starter
    buildCommand: pnpm install && pnpm build
    startCommand: NODE_ENV=production node scripts/start-with-cron.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_BASE_URL
        value: "https://api.deepseek.com"
      - key: OPENAI_MODEL
        value: "deepseek-v4-pro"
      - key: AUTO_GEN_ENABLED
        value: "true"
    healthCheckPath: /health
    autoDeploy: true
