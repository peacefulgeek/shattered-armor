services:
  - type: web
    name: shattered-armor
    runtime: node
    plan: starter
    buildCommand: pnpm install && pnpm build
    startCommand: NODE_ENV=production node scripts/start-with-cron.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
    healthCheckPath: /health
    autoDeploy: true
